name: Cebu Outage Scraper
on:
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Playwright browsers & system dependencies
        run: |
          python -m playwright install --with-deps chromium
      - name: Run Scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python parse_veco.py
      - name: Upload data.js to Sakura Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SAKURA_HOST }}
          username: ${{ secrets.SAKURA_USER }}
          password: ${{ secrets.SAKURA_PASSWORD }}
          source: "data.js"
          target: "/home/saisa/www/office-luna.com/infra/"
      - name: Commit and Push cache only
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git stash
          git fetch origin main
          git rebase origin/main
          git add translation_cache.json
          if ! git diff --cached --quiet; then
            git commit -m "Update translation cache"
            git push
          fi
